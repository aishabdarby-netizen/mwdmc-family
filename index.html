<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MWDMC Family Reunion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a3faa;--blue-dark:#0d1f6e;--blue-mid:#2450c0;
  --blue-pale:#eef2ff;--blue-light:#dbe4ff;
  --gold:#c9981a;--gold-light:#e8b830;
  --white:#ffffff;--cream:#f8f9fe;
  --text:#0a1540;--muted:#4a5a80;--border:#c5cce8;
  --green:#145c2e;--red:#8b1a1a;
}
html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}

/* ── NAV ── */
nav{background:var(--blue-dark);position:sticky;top:0;z-index:300;box-shadow:0 3px 24px rgba(0,0,0,0.45)}
.nav-top{display:flex;align-items:center;justify-content:space-between;padding:10px 28px;border-bottom:2px solid var(--gold)}
.brand{display:flex;align-items:center;gap:14px;cursor:pointer;text-decoration:none}
.brand-logo{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.brand-text .name{font-family:'Cormorant Garamond',serif;color:var(--white);font-size:20px;font-weight:700;letter-spacing:.5px}
.brand-text .sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:1px}
.nav-scroll{display:flex;overflow-x:auto;scrollbar-width:none;background:var(--blue-dark)}
.nav-scroll::-webkit-scrollbar{display:none}
.ntab{flex-shrink:0;background:none;border:none;color:rgba(255,255,255,.6);font-family:'Lato',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:10px 15px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.ntab:hover{color:var(--gold-light);background:rgba(255,255,255,.06)}
.ntab.on{color:var(--gold);border-bottom-color:var(--gold)}
.ntab.chapter-tab{color:rgba(255,255,255,.45);font-size:9.5px}
.ntab.chapter-tab.on{color:var(--gold)}
.nav-divider{width:1px;background:rgba(255,255,255,.15);margin:6px 4px;flex-shrink:0}

/* ── PAGES ── */
.pg{display:none}.pg.on{display:block}

/* ── HOME HERO ── */
.hero{background:linear-gradient(155deg,var(--blue-dark) 0%,var(--blue) 55%,#1e4ed8 100%);padding:80px 32px 72px;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");z-index:0}
.hero>*{position:relative;z-index:1}
.hero-crest{width:140px;height:140px;border-radius:50%;object-fit:cover;border:4px solid var(--gold);box-shadow:0 0 0 8px rgba(201,152,26,.2),0 8px 32px rgba(0,0,0,.4);margin-bottom:28px}
.hero-tag{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(201,152,26,.5);color:var(--gold);font-size:10px;letter-spacing:5px;text-transform:uppercase;padding:6px 20px;margin-bottom:20px;border-radius:1px}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:700;color:var(--white);line-height:1.05;margin-bottom:8px}
.hero h1 em{color:var(--gold);font-style:normal}
.hero .sub-name{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:16px}
.hero .tagline{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:rgba(255,255,255,.8);margin-bottom:12px}
.hero p{font-size:15px;color:rgba(255,255,255,.65);max-width:540px;margin:0 auto 40px;line-height:1.8}
.hero-chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.85);font-size:11px;letter-spacing:1px;padding:7px 16px;border-radius:20px;cursor:pointer;transition:all .2s}
.chip:hover{background:var(--gold);color:var(--blue-dark);border-color:var(--gold);font-weight:700}

/* ── FEATURE GRID on home ── */
.feat-grid{max-width:1100px;margin:0 auto;padding:56px 24px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.feat-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:26px 22px;cursor:pointer;transition:all .22s;border-top:4px solid var(--blue);text-align:center}
.feat-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(26,63,170,.14);border-top-color:var(--gold)}
.feat-icon{font-size:32px;margin-bottom:14px}
.feat-card h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--blue-dark);margin-bottom:6px}
.feat-card p{font-size:13px;color:var(--muted);line-height:1.6}
.feat-card .go{margin-top:14px;font-size:12px;color:var(--gold);font-weight:700}

/* ── CHAPTERS SECTION on home ── */
.chapters-wrap{max-width:1100px;margin:0 auto;padding:20px 24px 64px}
.section-head{margin-bottom:28px}
.section-head h2{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--blue-dark);margin-bottom:6px}
.section-head p{font-size:14px;color:var(--muted)}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
.ch-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:20px 16px 16px;cursor:pointer;transition:all .22s;border-top:3px solid var(--blue)}
.ch-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(26,63,170,.13);border-top-color:var(--gold)}
.ch-card .city{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--blue-dark)}
.ch-card .region{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.ch-card .go{margin-top:12px;font-size:11px;color:var(--blue);font-weight:700}

/* ── PAGE HEADER ── */
.pg-header{background:linear-gradient(120deg,var(--blue-dark),var(--blue-mid));color:var(--white);padding:52px 32px 40px;border-bottom:3px solid var(--gold)}
.pg-header .back{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6);cursor:pointer;margin-bottom:14px;display:inline-flex;align-items:center;gap:6px}
.pg-header .back:hover{color:var(--gold)}
.pg-header h1{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:700;line-height:1.1}
.pg-header h1 span{color:var(--gold)}
.pg-header .sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-top:6px}

/* ── CONTENT AREA ── */
.content{max-width:960px;margin:0 auto;padding:40px 24px 72px}

/* ── CARDS ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:10px;margin-bottom:24px;overflow:hidden}
.card-head{background:var(--blue);color:var(--white);padding:15px 24px;font-family:'Cormorant Garamond',serif;font-size:19px;display:flex;align-items:center;gap:10px}
.card-head .dim{color:rgba(255,255,255,.65);font-weight:400;font-size:17px}
.card-body{padding:26px}

/* ── FIELDS ── */
.fg{margin-bottom:20px}.fg:last-child{margin-bottom:0}
.fl{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:700}
.fv{font-size:15px;color:var(--text);line-height:1.75;white-space:pre-wrap;min-height:20px}
.fv:empty::after{content:'Coming soon...';color:#ccc;font-style:italic;font-size:14px}

/* ── EVENTS ── */
.ev-list{display:flex;flex-direction:column;gap:12px}
.ev-item{display:flex;gap:16px;align-items:flex-start;background:var(--blue-pale);border-radius:8px;padding:14px 18px;border-left:4px solid var(--gold)}
.ev-date{background:var(--blue-dark);color:var(--white);border-radius:6px;padding:8px 12px;text-align:center;min-width:60px;flex-shrink:0}
.ev-date .mo{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.ev-date .dy{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;line-height:1;margin-top:2px}
.ev-info h4{font-weight:700;font-size:14px;margin-bottom:4px;color:var(--blue-dark)}
.ev-info p{font-size:13px;color:var(--muted);line-height:1.6}

/* ── FEES ── */
.fees-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:18px}
.fee-box{background:var(--blue-pale);border-radius:8px;padding:14px;text-align:center;border:1px solid var(--blue-light)}
.fee-box .age{font-size:11px;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.fee-box .amt{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--blue-dark)}
.fee-box .amt.free{color:var(--green);font-size:22px}

/* ── INFO BOX ── */
.info-box{background:var(--blue-pale);border-radius:8px;padding:16px 20px;font-size:14px;line-height:1.8;border:1px solid var(--blue-light)}
.info-box a{color:var(--blue);text-decoration:none}.info-box a:hover{text-decoration:underline}

/* ── PREAMBLE ── */
.preamble{background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));border-radius:10px;padding:32px;color:var(--white);margin-bottom:24px;border-left:5px solid var(--gold)}
.preamble blockquote{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;line-height:1.9;color:rgba(255,255,255,.92)}
.preamble cite{display:block;margin-top:14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);font-style:normal}

/* ── GALLERY ── */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.gallery-slot{background:var(--blue-pale);border:2px dashed var(--border);border-radius:10px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;text-align:center;padding:20px}
.gallery-slot:hover{border-color:var(--blue);background:var(--blue-light)}
.gallery-slot .gi{font-size:36px;margin-bottom:10px}
.gallery-slot p{font-size:13px;color:var(--muted)}
.gallery-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;transition:transform .2s}
.gallery-img:hover{transform:scale(1.03)}
.upload-btn{background:var(--blue);color:var(--white);border:none;border-radius:6px;padding:11px 26px;font-family:'Lato',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:24px;letter-spacing:.5px}
.upload-btn:hover{background:var(--blue-dark)}
#file-input{display:none}

/* ── REGISTRATION FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700}
.form-group input,.form-group select,.form-group textarea{border:1.5px solid var(--border);border-radius:6px;padding:11px 14px;font-family:'Lato',sans-serif;font-size:14px;color:var(--text);background:var(--white);transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue)}
.form-group textarea{resize:vertical}
.submit-btn{background:var(--blue-dark);color:var(--white);border:none;border-radius:6px;padding:13px 36px;font-family:'Lato',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;margin-top:8px;transition:background .2s}
.submit-btn:hover{background:var(--blue)}
.form-note{font-size:13px;color:var(--muted);margin-top:8px;font-style:italic}
.success-msg{background:#e8f8ee;border:1px solid #a3dab4;border-radius:8px;padding:16px 20px;color:var(--green);font-weight:700;display:none;margin-top:16px}

/* ── MERCH ── */
.merch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.merch-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .22s}
.merch-card:hover{box-shadow:0 8px 24px rgba(26,63,170,.14);transform:translateY(-3px)}
.merch-img{background:linear-gradient(135deg,var(--blue-pale),var(--blue-light));height:200px;display:flex;align-items:center;justify-content:center;font-size:64px}
.merch-info{padding:18px}
.merch-info h4{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--blue-dark);margin-bottom:4px}
.merch-info .price{font-size:20px;font-weight:700;color:var(--blue);margin-bottom:12px}
.merch-btn{background:var(--blue);color:var(--white);border:none;border-radius:5px;padding:9px 20px;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;cursor:pointer;width:100%;transition:background .2s}
.merch-btn:hover{background:var(--blue-dark)}

/* ── DIRECTORY ── */
.dir-search{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:12px 18px;font-family:'Lato',sans-serif;font-size:15px;color:var(--text);margin-bottom:20px}
.dir-search:focus{outline:none;border-color:var(--blue)}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.dir-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:18px;display:flex;align-items:center;gap:14px}
.dir-avatar{width:50px;height:50px;border-radius:50%;background:var(--blue);color:var(--white);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;flex-shrink:0}
.dir-info h4{font-weight:700;font-size:14px;color:var(--blue-dark)}
.dir-info p{font-size:12px;color:var(--muted);margin-top:2px}
.dir-info .branch{font-size:11px;color:var(--blue);font-weight:700;margin-top:4px}

/* ── IN MEMORIAM ── */
.mem-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.mem-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:24px;text-align:center;border-top:4px solid var(--blue-dark)}
.mem-card .mem-icon{font-size:40px;margin-bottom:12px}
.mem-card h4{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--blue-dark);margin-bottom:4px}
.mem-card .years{font-size:13px;color:var(--muted);margin-bottom:10px;letter-spacing:1px}
.mem-card p{font-size:13px;color:var(--text);line-height:1.7;font-style:italic}
.candle{font-size:20px;margin-top:12px}

/* ── PRAYER ── */
.prayer-card{background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));border-radius:12px;padding:36px;color:var(--white);text-align:center;margin-bottom:24px}
.prayer-card h3{font-family:'Cormorant Garamond',serif;font-size:26px;margin-bottom:16px;color:var(--gold)}
.prayer-card p{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;line-height:2;color:rgba(255,255,255,.9)}
.verse-card{background:var(--white);border-radius:10px;padding:26px;border-left:5px solid var(--gold);margin-bottom:18px}
.verse-card blockquote{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--text);line-height:1.9;margin-bottom:10px}
.verse-card cite{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

/* ── DONATION ── */
.donate-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.donate-amt{background:var(--white);border:2px solid var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--blue-dark)}
.donate-amt:hover,.donate-amt.selected{border-color:var(--blue);background:var(--blue-pale);color:var(--blue)}
.donate-purpose{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.purpose-opt{background:var(--white);border:2px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.purpose-opt:hover,.purpose-opt.selected{border-color:var(--gold);background:#fffbf0}
.purpose-opt h4{font-weight:700;font-size:14px;color:var(--blue-dark);margin-bottom:4px}
.purpose-opt p{font-size:12px;color:var(--muted)}

/* ── HISTORY TREE ── */
.tree-wrap{text-align:center;padding:10px 0 30px}
.tree-wrap svg{max-width:100%;height:auto}
.family-line{margin-bottom:28px}
.family-line h3{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--blue-dark);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--gold);display:inline-block}
.family-names{display:flex;flex-wrap:wrap;gap:10px}
.name-pill{background:var(--blue-pale);border:1px solid var(--blue-light);border-radius:20px;padding:7px 16px;font-size:13px;color:var(--blue-dark);font-weight:600}

/* ── BYLAW ── */
.bylaw{margin-bottom:18px}
.bylaw h3{font-size:13px;font-weight:700;color:var(--blue-dark);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.bylaw p{font-size:14px;line-height:1.75;color:var(--text)}

/* ── CHAPTER PAGE ── */
.edit-btn{margin-top:20px;padding:9px 24px;border:2px solid var(--gold);border-radius:4px;background:transparent;color:var(--gold);font-family:'Lato',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s}
.edit-btn:hover{background:var(--gold);color:var(--blue-dark)}

footer{background:var(--blue-dark);color:rgba(255,255,255,.4);text-align:center;padding:28px;font-size:12px;border-top:3px solid var(--gold);display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
footer img{width:38px;height:38px;border-radius:50%;opacity:.7;border:1px solid var(--gold)}
footer a{color:rgba(255,255,255,.6)}.footer a:hover{color:var(--gold)}
</style>
</head>
<body>

<nav>

function renderNav(){
  let html=mainPages.map(p=>`<button class="ntab${currentPage===p.id?" on":""}" onclick="go('${p.id}')">${p.label}</button>`).join("");
  html+=`<div class="nav-divider"></div>`;
  html+=chapters.map(ch=>`<button class="ntab chapter-tab${currentPage===ch.id?" on":""}" onclick="go('${ch.id}')">${ch.city}</button>`).join("");
  document.getElementById("navTabs").innerHTML=html;
}

function pageGallery(){

  const empties=Math.max(0,8-galleryImages.length);
  const empty=Array(empties).fill(`<div class="gallery-slot"><div class="gi">📸</div><p>Add a family photo</p></div>`).join("");
  return `<div class="pg on">
    <div class="pg-header"><div class="back" onclick="go('home')">← Home</div><h1>Photo <span>Gallery</span></h1><div class="sub">MWDMC Family Memories</div></div>

        <input type="file" id="file-input" accept="image/*" multiple onchange="uploadPhotos(event)">
        <button class="upload-btn" onclick="document.getElementById('file-input').click()">📷 Upload Photos</button>
        <div class="gallery-grid">${slots}${empty}</div>
      </div></div>
    </div>
    <div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:none;align-items:center;justify-content:center" onclick="this.style.display='none'">
      <img id="lb-img" style="max-width:90%;max-height:90vh;border-radius:8px;border:3px solid var(--gold)">
    </div>
  </div>`;
}
function uploadPhotos(e){
  const files=Array.from(e.target.files);
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{galleryImages.push(ev.target.result);localStorage.setItem("mwdmc_gallery",JSON.stringify(galleryImages));render();};
    r.readAsDataURL(f);
  });
}
function lightbox(src){
  const lb=document.getElementById("lightbox");
  document.getElementById("lb-img").src=src;
  lb.style.display="flex";
}

  renderNav();
  const app=document.getElementById("app");
  const ch=chapters.find(c=>c.id===currentPage);
  if(ch){app.innerHTML=pageChapter(ch);return;}
  switch(currentPage){
    case "home":      app.innerHTML=pageHome();break;
    case "gallery":   app.innerHTML=pageGallery();break;
    case "history":   app.innerHTML=pageHistory();break;
    case "register":  app.innerHTML=pageRegister();break;
    case "merch":     app.innerHTML=pageMerch();break;
    case "directory": app.innerHTML=pageDirectory();break;
    case "prayer":    app.innerHTML=pagePrayer();break;
    case "memoriam":  app.innerHTML=pageMemoriam();break;
    case "donate":    app.innerHTML=pageDonate();break;
    default:          app.innerHTML=pageHome();
  }
}

render();
</script>
</body>
</html>
